function checkSensitive() {
  const text = document.getElementById('inputText').value;
  if (!text.trim()) { alert('璇疯緭鍏ヨ妫€娴嬬殑鏂囨湰'); return; }

  const matches = [];
  let highlighted = text;

  sensitiveWords.forEach(sw => {
    const re = new RegExp(sw.word, 'gi');
    let match;
    while ((match = re.exec(text)) !== null) {
      matches.push({ word: sw.word, cat: sw.cat, note: sw.note, index: match.index });
    }
  });

  matches.sort((a, b) => a.index - b.index);

  // Deduplicate overlapping matches
  const unique = [];
  matches.forEach(m => {
    if (unique.length === 0 || m.index !== unique[unique.length-1].index) {
      unique.push(m);
    }
  });

  const summary = document.getElementById('summaryArea');
  const count = document.getElementById('matchCount');
  count.textContent = unique.length;
  summary.style.display = unique.length > 0 ? 'block' : 'none';

  const result = document.getElementById('resultOutput');
  const detail = document.getElementById('detailOutput');
  const detailArea = document.getElementById('detailArea');

  if (unique.length === 0) {
    result.innerHTML = '<span style="color:var(--success);font-weight:600;">锟?鏈娴嬪埌鏁忔劅璇嶏紝鍐呭鍚堣</span>';
    detailArea.style.display = 'none';
  } else {
    // Highlight matches in text
    let highlighted = text;
    const offsets = [];
    unique.forEach(m => { offsets.push(m.index); });
    // Work backward to avoid offset shift
    const sorted = [...unique].sort((a, b) => b.index - a.index);
    sorted.forEach(m => {
      const word = text.substr(m.index, m.word.length);
      highlighted = highlighted.slice(0, m.index) +
        `<span class="sens-match">${word}</span>` +
        highlighted.slice(m.index + word.length);
    });
    result.innerHTML = highlighted.replace(/\n/g, '<br>');

    // Detail list
    const cats = {};
    unique.forEach(m => {
      if (!cats[m.cat]) cats[m.cat] = [];
      cats[m.cat].push(m.word);
    });
    detail.innerHTML = Object.entries(cats).map(([cat, words]) => {
      const countMap = {};
      words.forEach(w => { countMap[w] = (countMap[w] || 0) + 1; });
      return `<div style="margin-bottom:10px"><strong>${cat}锟?{words.length}澶勶級</strong><br>` +
        Object.entries(countMap).map(([w, c]) => `<span class="sens-match" style="background:var(--border-light);color:var(--text);font-weight:600;margin:2px 4px 2px 0">${w} 脳${c}</span>`).join('') +
        `</div>`;
    }).join('');
    detailArea.style.display = 'block';
  }
  showOutput('outputArea');
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputArea').classList.add('hidden');
  document.getElementById('summaryArea').style.display = 'none';
}
