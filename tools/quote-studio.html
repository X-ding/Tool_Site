<script>
var W=1080,H=1080;
var renderTimer=null;
var templates=[
{id:"quote",name:"缁忓吀寮曠敤",bg:"#1e293b",txt:"#ffffff",acc:"#fbbf24",icon:"#1e293b"},
{id:"warm",name:"娓╂殩璇綍",bg:"#fce4c8",txt:"#5d4037",acc:"#e8a87c",icon:"#fce4c8"},
{id:"gradient",name:"娓愬彉椋庢牸",bg:"#667eea",txt:"#ffffff",acc:"#fff",icon:"#667eea"},
{id:"minimal",name:"绠€绾︾櫧",bg:"#ffffff",txt:"#1e293b",acc:"#3b82f6",icon:"#ffffff"},
{id:"nature",name:"鑷劧锟?,bg:"#11998e",txt:"#ffffff",acc:"#fde68a",icon:"#11998e"},
{id:"bold",name:"娼祦锟?,bg:"#232526",txt:"#ffffff",acc:"#ef4444",icon:"#232526"},
{id:"sunset",name:"钀芥棩锟?,bg:"#f5576c",txt:"#ffffff",acc:"#fde68a",icon:"#f5576c"},
{id:"ocean",name:"娣辨捣锟?,bg:"#0c3483",txt:"#ffffff",acc:"#6dd5fa",icon:"#0c3483"},
];
function init(){
 var g=document.getElementById("tplGrid");
 templates.forEach(function(t,i){
   var b=document.createElement("button");
   b.innerHTML='<span class="swatch" style="background:'+t.icon+'"></span>'+t.name;
   if(i===0)b.className="active";
   b.onclick=function(){selectTpl(i);};
   g.appendChild(b);
 });
 document.querySelectorAll("#formatRow button").forEach(function(b){
   b.onclick=function(){
     document.querySelectorAll("#formatRow button").forEach(function(x){x.className="";});
     b.className="active";
     scheduleRender();
   };
 });
 renderCard();
}
function selectTpl(idx){
 document.querySelectorAll("#tplGrid button").forEach(function(b,i){b.className=i===idx?"active":"";});
 var t=templates[idx];
 document.getElementById("bgColor").value=t.bg;
 document.getElementById("textColor").value=t.txt;
 document.getElementById("accentColor").value=t.acc;
 renderCard();
}
function scheduleRender(){clearTimeout(renderTimer);renderTimer=setTimeout(renderCard,120);}

function randomTemplate(){selectTpl(Math.floor(Math.random()*templates.length));}
var exQuotes=[["姣忎竴娆″姫锟?,"閮芥槸骞歌繍鐨勪紡锟?,"姣忔棩璇綍"],["涓栫晫寰堝ぇ","鎬绘湁浜烘瘮浣犳洿鐖变綘","鏆栧績鍒嗕韩"],["鍏充簬鎴愰暱","鍏堝畬鎴愶紝鍐嶅畬锟?,"骞茶揣鍒嗕韩"],["闈欎笅蹇冩潵","鍋氭渶濂界殑鑷繁","鑷渷鏃跺埢"]];
function setExample(idx){
  var e=exQuotes[idx%exQuotes.length];
  document.getElementById("mainTitle").value=e[0];
  document.getElementById("bodyText").value=e[1];
  document.getElementById("footerText").value=e[2];
  renderCard();
}

function wrapText(ctx,text,maxW){
 var lines=[],paras=text.split("\n");
 paras.forEach(function(para){
   if(!para.trim()){lines.push("");return;}
   var line="";
   for(var i=0;i<para.length;i++){
     var test=line+para[i];
     if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=para[i];}
     else line=test;
   }
   if(line)lines.push(line);
 });
 return lines;
}
function renderCard(){
 var fmt=document.querySelector("#formatRow .active").dataset.fmt;
 if(fmt==="landscape"){W=1920;H=1080;}else if(fmt==="portrait"){W=1080;H=1440;}else{W=1080;H=1080;}
 var canvas=document.getElementById("previewCanvas");
 var ctx=canvas.getContext("2d");
 canvas.width=W;canvas.height=H;
 document.getElementById("sizeTip").textContent=W+" x "+H+" | "+(fmt==="square"?"1:1":fmt==="landscape"?"16:9":"3:4");
 var bgColor=document.getElementById("bgColor").value;
 var textColor=document.getElementById("textColor").value;
 var accentColor=document.getElementById("accentColor").value;
 var mainTitle=document.getElementById("mainTitle").value.trim()||"鏍囬";
 var bodyText=document.getElementById("bodyText").value.trim();
 var footerText=document.getElementById("footerText").value.trim();
 var grad=ctx.createLinearGradient(0,0,W,H);
 grad.addColorStop(0,bgColor);
 grad.addColorStop(1, adjustColor(bgColor,-40));
 ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
 ctx.globalAlpha=0.06;
 ctx.fillStyle=accentColor;
 ctx.font="400px serif";ctx.textAlign="left";ctx.textBaseline="top";
 ctx.fillText("\u201c",80,60);
 ctx.globalAlpha=1;
 var tSize=Math.min(72,Math.floor(W/14));
 if(mainTitle.length>8)tSize=Math.floor(tSize*0.75);
 ctx.fillStyle=textColor;
 ctx.font="bold "+tSize+"px PingFang SC,Microsoft YaHei,sans-serif";
 ctx.textAlign="center";ctx.textBaseline="top";
 var maxW=W-140;
 var tLines=wrapText(ctx,mainTitle,maxW);
 var lh=tSize*1.4;
 var tY=Math.floor(H*0.32);
 tLines.forEach(function(line,i){ctx.fillText(line,W/2,tY+i*lh);});
 var lineY=tY+tLines.length*lh+16;
 ctx.globalAlpha=0.3;
 ctx.fillStyle=accentColor;
 ctx.fillRect(W/2-30,lineY,60,3);
 ctx.globalAlpha=1;
 if(bodyText){
   ctx.globalAlpha=0.8;
   ctx.fillStyle=textColor;
   var bSize=Math.min(36,Math.floor(W/22));
   ctx.font=bSize+"px PingFang SC,Microsoft YaHei,sans-serif";
   var bLines=wrapText(ctx,bodyText,maxW);
   var bY=lineY+20;
   bLines.forEach(function(line,i){ctx.fillText(line,W/2,bY+i*bSize*1.4);});
   ctx.globalAlpha=1;
 }
 if(footerText){
   ctx.globalAlpha=0.4;
   ctx.fillStyle=textColor;
   ctx.font="22px PingFang SC,Microsoft YaHei,sans-serif";
   ctx.textAlign="center";ctx.textBaseline="bottom";
   ctx.fillText(footerText,W/2,H-50);
   ctx.globalAlpha=1;
 }
 ctx.globalAlpha=0.18;
 ctx.fillStyle=textColor;
 ctx.font="16px PingFang SC,Microsoft YaHei,sans-serif";
 ctx.textAlign="right";ctx.textBaseline="bottom";
 var dispW=Math.min(540,W/2);
 var dispH=dispW*H/W;
 canvas.style.width=dispW+"px";
 canvas.style.height=dispH+"px";
}
function adjustColor(hex,amt){
 var n=parseInt(hex.replace("#",""),16);
 var r=Math.min(255,Math.max(0,(n>>16)+amt));
 var g=Math.min(255,Math.max(0,((n>>8)&0xFF)+amt));
 var b=Math.min(255,Math.max(0,(n&0xFF)+amt));
 return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function downloadCard(){
 var canvas=document.getElementById("previewCanvas");
 var link=document.createElement("a");
 link.download="text_card_"+Date.now()+".png";
 link.href=canvas.toDataURL("image/png");
 link.click();
}
init();
</script>
<script src="/js/animations.js"></script></body>
